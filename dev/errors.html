<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error Log — Turkish Quiz (dev)</title>
  <style>
    :root {
      --bg: #101418;
      --panel: #161b22;
      --border: #2a2f37;
      --fg: #e6edf3;
      --muted: #8b949e;
      --accent: #79c0ff;
      --danger: #f85149;
      --warn: #d29922;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
    }
    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    header h1 { margin: 0; font-size: 18px; }
    header .count { color: var(--muted); font-variant-numeric: tabular-nums; }
    header .status { margin-left: auto; color: var(--muted); font-size: 12px; }
    main { padding: 16px 24px; max-width: 1100px; margin: 0 auto; }
    .empty {
      padding: 48px 16px;
      text-align: center;
      color: var(--muted);
    }
    .entry {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 12px;
    }
    .entry-head {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
    }
    .entry-head .kind {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 2px 8px;
      border-radius: 10px;
      border: 1px solid var(--border);
      color: var(--accent);
      white-space: nowrap;
    }
    .entry-head .kind.network_failure { color: var(--warn); }
    .entry-head .kind.unhandled_rejection { color: var(--warn); }
    .entry-head .kind.js_error { color: var(--danger); }
    .entry-head .message {
      flex: 1;
      font-weight: 600;
      word-break: break-word;
    }
    .entry-head .time {
      color: var(--muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .entry-meta {
      padding: 0 16px 12px 16px;
      color: var(--muted);
      font-size: 12px;
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 4px 12px;
    }
    .entry-meta dt { color: var(--muted); }
    .entry-meta dd { margin: 0; color: var(--fg); word-break: break-word; }
    .entry-body {
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: none;
    }
    .entry.open .entry-body { display: block; }
    .entry-body h3 {
      margin: 12px 0 4px 0;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }
    .entry-body h3:first-child { margin-top: 0; }
    .entry-body pre {
      margin: 0;
      padding: 8px;
      background: #0b0f14;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: auto;
      font-size: 12px;
      color: #c9d1d9;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .entry-body ol {
      margin: 0;
      padding-left: 20px;
      font-size: 12px;
      color: #c9d1d9;
    }
    .entry-actions {
      border-top: 1px solid var(--border);
      padding: 8px 16px;
      text-align: right;
    }
    button.delete-btn {
      background: transparent;
      border: 1px solid var(--danger);
      color: var(--danger);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font: inherit;
    }
    button.delete-btn:hover { background: rgba(248, 81, 73, 0.1); }
  </style>
</head>
<body>

<header>
  <h1>Error Log</h1>
  <span class="count" id="count">0 records</span>
  <span class="status" id="status">connecting…</span>
</header>

<main id="error-list">
  <div class="empty" id="empty">No errors recorded.</div>
</main>
